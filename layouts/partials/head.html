<meta charset="utf-8" />
<meta http-equiv="x-ua-compatible" content="ie=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preload" as="font" type="font/woff2" href="/fonts/MonaSansVF[wdth,wght,opsz,ital].woff2" crossorigin />

<title>Pomotroid - A Simple, Configurable and Visually Pleasing Pomodoro Timer</title>

<meta name="description" content="{{ .Site.Params.description }}" />
<meta name="keywords" content="pomodoro, pomotroid, open source, tauri, rust, svelte" />

<link rel="canonical" href="{{ .Permalink }}" />

<link rel="alternate" type="application/rss+xml" title="Pomotroid News" href="/news/index.xml" />

{{ if and .IsPage (eq .Section "news") }}
<meta property="og:title" content="{{ .Title }} — Pomotroid" />
<meta property="og:description" content="{{ .Description }}" />
<meta property="og:type" content="article" />
<meta property="og:url" content="{{ .Permalink }}" />
{{ if .Params.cover }}
<meta property="og:image" content="{{ .Params.cover | absURL }}" />
{{ else }}
<meta property="og:image" content="{{ .Site.BaseURL }}pomotroid-share-1200x630.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
{{ end }}
{{ else }}
<meta property="og:title" content="Pomotroid - A Simple, Configurable and Visually Pleasing Pomodoro Timer" />
<meta property="og:description" content="{{ .Site.Params.description }}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ .Site.BaseURL }}" />
<meta property="og:image" content="{{ .Site.BaseURL }}pomotroid-share-1200x630.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
{{ end }}

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:site" content="Pomotroid" />
<meta name="twitter:creator" content="@splode" />
<meta name="twitter:url" content="{{ .Site.BaseURL }}" />
<meta name="twitter:title" content="Pomotroid - A Simple, Configurable and Visually Pleasing Pomodoro Timer" />
<meta name="twitter:description" content="{{ .Site.Params.description }}" />
<meta name="twitter:image" content="{{ .Site.BaseURL }}pomotroid-share-1200x630.png" />

<link rel="icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="57x57" href="/favicons/apple-icon-57x57.png" />
<link rel="apple-touch-icon" sizes="60x60" href="/favicons/apple-icon-60x60.png" />

<link rel="apple-touch-icon" sizes="76x76" href="/favicons/apple-icon-76x76.png" />
<link rel="apple-touch-icon" sizes="114x114" href="/favicons/apple-icon-114x114.png" />
<link rel="apple-touch-icon" sizes="120x120" href="/favicons/apple-icon-120x120.png" />
<link rel="apple-touch-icon" sizes="144x144" href="/favicons/apple-icon-144x144.png" />
<link rel="apple-touch-icon" sizes="152x152" href="/favicons/apple-icon-152x152.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-icon-180x180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/favicons/android-icon-192x192.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="96x96" href="/favicons/favicon-96x96.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />

<meta name="msapplication-TileImage" content="/favicons/ms-icon-144x144.png" />
<meta name="theme-color" content="#2F384B" />

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "Pomotroid",
  "url": "{{ .Site.BaseURL }}",
  "operatingSystem": "Windows, Linux, macOS",
  "applicationCategory": "LifestyleApplication",
  "downloadUrl": "https://github.com/Splode/pomotroid/releases",
  "offers": {
    "@type": "Offer",
    "price": "0"
  },
  "review": {
    "@type": "Review",
    "reviewRating": {
      "@type": "Rating",
      "ratingValue": "4.3"
    },
    "author": {
      "@type": "Person",
      "name": "M.Hanny Sabbagh"
    },
    "reviewBody": "Pomotroid is the best open source Pomodoro technique app yet. Pomotroid is a fantastic open source app for Pomodoro technique. Not having a system tray icon is a negative side, but other than that, the program is great for fulfilling its purpose."
  }
}
</script>

{{ $scss := resources.Get "scss/main.scss" | css.Sass (dict "outputStyle" "compressed") | resources.Fingerprint }}
<link rel="stylesheet" href="{{ $scss.RelPermalink }}" integrity="{{ $scss.Data.Integrity }}" />
